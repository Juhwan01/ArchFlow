# ============================================================================
# ArchFlow Configuration
# 이 파일을 archflow.config.yml 로 복사한 뒤, 팀에 맞게 수정하세요.
#   cp archflow.config.example.yml archflow.config.yml
# ============================================================================

# ---------------------------------------------------------------------------
# Jira Cloud
# ---------------------------------------------------------------------------
jira:
  url: "https://your-domain.atlassian.net"

  # 조회할 Jira 프로젝트 키 목록 (여러 프로젝트 가능)
  projects:
    - "KAN"
    # - "FRONT"
    # - "BACK"

  # 스프린트 조회에 사용할 보드 ID
  #
  # 찾는 법:
  #   1. Jira에서 원하는 보드 열기
  #   2. URL 확인: https://your-domain.atlassian.net/jira/software/projects/KAN/boards/1
  #                                                                              ^^^^
  #   3. 맨 뒤 숫자가 board_id (이 예시에서는 "1")
  #
  # 또는 Jira 좌측 메뉴 > Board settings > URL에서 확인 가능
  board_id: "1"

# ---------------------------------------------------------------------------
# GitHub
# ---------------------------------------------------------------------------
github:
  # 조회할 GitHub 레포 목록 (owner/repo 형식)
  repos:
    - "your-org/backend-api"
    # - "your-org/frontend-web"
    # - "your-org/mobile-app"

  default_branch: "main"

# ---------------------------------------------------------------------------
# Google Drive (Draw.io 다이어그램 저장소)
# Draw.io를 사용하지 않으면 이 섹션 전체를 비워도 됩니다.
# ---------------------------------------------------------------------------
gdrive:
  # Google Drive 폴더 ID (.drawio 파일이 있는 폴더)
  #
  # 찾는 법:
  #   1. Google Drive에서 .drawio 파일이 있는 폴더 열기
  #   2. URL 확인: https://drive.google.com/drive/folders/1AbCdEfGhIjKlMnOpQrStUv
  #                                                       ^^^^^^^^^^^^^^^^^^^^^^^^
  #   3. /folders/ 뒤의 문자열이 folder_id
  folder_id: ""

  # 다이어그램 캐시 유지 시간 (분). 이 시간 동안 같은 질문은 API 호출 없이 캐시 반환.
  # 서버 재시작하면 캐시 초기화됨.
  cache_ttl_minutes: 30

# ---------------------------------------------------------------------------
# 소스 간 매칭 설정
# Draw.io 다이어그램 노드 ↔ Jira 컴포넌트/GitHub 경로를 연결합니다.
# ---------------------------------------------------------------------------
matching:
  # 수동 매핑: 정확하게 "이 노드 = 이 컴포넌트" 지정
  # 자동 매칭이 부정확할 때 사용
  explicit:
    - diagram_node: "Auth Service"       # Draw.io에서 노드 라벨
      jira_component: "authentication"   # Jira 컴포넌트 이름
      jira_labels: ["auth"]              # Jira 라벨 (선택)
      github_path_prefix: "src/auth/"    # GitHub 경로 접두사
    # - diagram_node: "API Gateway"
    #   jira_component: "api-gateway"
    #   github_path_prefix: "src/gateway/"

  # 자동 매칭: Draw.io 노드 라벨과 Jira 컴포넌트를 자동으로 연결
  auto_match:
    enabled: true

    # 매칭 전략:
    #   exact    — 이름이 정확히 같아야 매칭 (대소문자 무시)
    #              예: "Auth Service" = "auth service" ✓, "Auth" ✗
    #   fuzzy    — 유사도 점수로 매칭 (min_score 이상이면 매칭)
    #              예: "Auth Service" ≈ "authentication" (score 0.72) ✓
    #   contains — 한쪽이 다른 쪽을 포함하면 매칭
    #              예: "Auth Service" contains "auth" ✓
    strategy: "fuzzy"

    # 퍼지 매칭 임계값 (0.0 ~ 1.0)
    #   0.5 = 느슨 (오탐 많음)
    #   0.7 = 균형 (권장)
    #   0.9 = 엄격 (미탐 많음)
    min_score: 0.7

  # GitHub PR/브랜치에서 Jira 이슈 키를 감지하는 정규식
  # 프로젝트 키에 맞게 수정하세요 (KAN, FRONT 등)
  issue_patterns:
    - "(?i)KAN-\\d+"
    # - "(?i)FRONT-\\d+"
